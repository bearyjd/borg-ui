name: Release

# Builds the Windows installers (MSI + NSIS) with borg bundled, uploads them as
# build artifacts on every run, and publishes a GitHub Release ONLY for version
# tags.
#
# Cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
# → builds, uploads artifacts, and creates a DRAFT release with the installers
#   attached. Review the assets, then click "Publish release". To auto-publish,
#   change `--draft` below.
#
# Dry-run (no release): Actions → Release → "Run workflow" (workflow_dispatch),
# or push any non-tag ref. The build + artifact-upload still run, so you get
# downloadable installers; only the publish step is skipped.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      enable_signing:
        description: "Require Azure Artifact Signing for this run"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build Windows installers
    runs-on: windows-latest
    env:
      SIGNING_ENABLED: ${{ (inputs.enable_signing == true || vars.ENABLE_CODE_SIGNING == 'true') && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: app-tauri
        run: pnpm install --frozen-lockfile

      - name: Test signing configuration validator
        shell: pwsh
        run: ./scripts/test-signing-config.ps1

      - name: Validate signing configuration
        if: env.SIGNING_ENABLED == 'true'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          SIGNING_PROFILE: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
        run: ./scripts/validate-signing-config.ps1 -SigningEnabled $true

      # borg.exe (marcpope/borg-windows 1.4.4+win6) is a PyInstaller ONEDIR
      # bundle: borg.exe needs its sibling _internal\ (python311.dll + deps) right
      # beside it or it dies at startup. We download the pinned release, verify its
      # SHA-256, and drop the whole dist into src-tauri/binaries/borg/ so the Tauri
      # bundler (see tauri.windows.conf.json `resources`) lays it down next to
      # borg-ui.exe in the installed app.
      - name: Fetch and stage borg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version  = 'v1.4.4-win6'
          $url      = "https://github.com/marcpope/borg-windows/releases/download/$version/borg-windows.zip"
          $expected = '0e5f780d749608beed12be1bdca99526a7f95df2cbdcf1fd151b646e97c070d8'

          $zip = Join-Path $env:RUNNER_TEMP 'borg-windows.zip'
          Write-Host "Downloading borg $version ..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing

          $actual = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) {
            throw "borg checksum mismatch: expected $expected but got $actual"
          }
          Write-Host "Checksum OK: $actual"

          $extract = Join-Path $env:RUNNER_TEMP 'borg-extract'
          Expand-Archive -Path $zip -DestinationPath $extract -Force

          $borgExe = Get-ChildItem $extract -Recurse -Filter borg.exe | Select-Object -First 1
          if (-not $borgExe) { throw 'borg.exe not found in archive' }
          $src = $borgExe.Directory.FullName

          $dest = Join-Path $env:GITHUB_WORKSPACE 'app-tauri/src-tauri/binaries/borg'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path (Join-Path $src '*') -Destination $dest -Recurse -Force

          if (-not (Test-Path (Join-Path $dest 'borg.exe')))  { throw 'borg.exe missing after staging' }
          if (-not (Test-Path (Join-Path $dest '_internal'))) { throw '_internal missing after staging (PyInstaller onedir incomplete)' }
          & (Join-Path $dest 'borg.exe') --version

      - name: Test signature verifier with Windows fixture
        shell: pwsh
        run: ./scripts/verify-authenticode.ps1 -Paths "$env:WINDIR\System32\notepad.exe" -ExpectSigned $true

      - name: Build frontend and application executable
        working-directory: app-tauri
        run: |
          pnpm build
          cargo build --release -p borg-ui --locked

      - name: Azure login for Artifact Signing
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign application executable
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files: ${{ github.workspace }}\target\release\borg-ui.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Always bundle, so disabled signing remains a tested and supported path.
      - name: Build installers
        working-directory: app-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm tauri bundle

      - name: Sign MSI installer
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\target\release\bundle\msi
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign NSIS installer
        if: env.SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\target\release\bundle\nsis
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode
        if: env.SIGNING_ENABLED == 'true'
        working-directory: app-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          Get-ChildItem ..\target\release\bundle\msi\*.msi, ..\target\release\bundle\nsis\*-setup.exe |
            ForEach-Object { pnpm tauri signer sign $_.FullName }

      - name: Verify Authenticode status
        shell: pwsh
        run: |
          $paths = @(
            'target/release/borg-ui.exe',
            (Get-ChildItem target/release/bundle/msi/*.msi | Select-Object -First 1 -ExpandProperty FullName),
            (Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1 -ExpandProperty FullName)
          )
          ./scripts/verify-authenticode.ps1 -Paths $paths -ExpectSigned:($env:SIGNING_ENABLED -eq 'true')

      - name: Build updater manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $installer) { throw 'NSIS updater installer not found' }
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) { throw "updater signature missing: $signaturePath" }
          $signature = (Get-Content $signaturePath -Raw).Trim()
          $config = Get-Content app-tauri/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $config.version
          $tag = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } else { "v$version" }
          $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/$($installer.Name)"
          $manifest = @{
            version = $version
            notes = "BorgUI $version"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $url
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content target/release/bundle/latest.json -Encoding utf8

      # Always upload, so every run produces downloadable installers (used by the
      # headless installer test in tests/smoke-windows/validate-installer.ps1).
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: borgui-windows-installers-${{ env.SIGNING_ENABLED == 'true' && 'signed' || 'unsigned' }}
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.sig
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/latest.json
          if-no-files-found: error

      # Publish a draft release ONLY for a version tag. Uses the first-party gh
      # CLI (no third-party action holds the write-scoped token).
      - name: Publish draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(Get-ChildItem -Path target/release/bundle/msi/*.msi, target/release/bundle/msi/*.sig, target/release/bundle/nsis/*-setup.exe, target/release/bundle/nsis/*.sig, target/release/bundle/latest.json |
                     Select-Object -ExpandProperty FullName)
          if ($files.Count -eq 0) { throw 'no installers found to publish' }
          $notes = if ($env:SIGNING_ENABLED -eq 'true') {
            'Signed Windows installers (MSI and NSIS .exe) are attached below.'
          } else {
            'Unsigned Windows installers (MSI and NSIS .exe) are attached below. Windows SmartScreen may warn; click "More info" then "Run anyway".'
          }
          gh release create $env:GITHUB_REF_NAME --draft --title "BorgUI $env:GITHUB_REF_NAME" --notes $notes $files
